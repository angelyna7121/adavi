name: E2E

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  net-worth-e2e:
    name: Net Worth E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: development
      PORT: 4173
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      SESSION_SECRET: e2e-session-secret-at-least-32-characters
      PUBLIC_APP_URL: http://127.0.0.1:4173
      STRIPE_SECRET_KEY: sk_test_e2e_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_e2e_placeholder
      STRIPE_PRO_MONTHLY_PRICE_ID: price_e2e_monthly
      STRIPE_PRO_ANNUAL_PRICE_ID: price_e2e_annual

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Verify Neon test database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "NEON_DATABASE_URL is not configured. Add a dedicated Neon development/test database URL as a GitHub Actions secret."
            exit 1
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: TypeScript check
        run: pnpm run check

      - name: Run database migrations
        run: pnpm run db:migrate

      - name: Production build
        run: pnpm run build

      - name: Net Worth E2E tests
        run: pnpm run test:e2e

      - name: Clean up E2E test data
        if: always()
        continue-on-error: true
        run: pnpm run test:e2e:cleanup

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
